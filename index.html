<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Countdown</title>

<style>
  body {
    margin: 0;
    font-family: "Spicy Rice", cursive;
    text-align: center;
    background: #fff;
    display: flex;
    justify-content: center;
  }

  .wrapper {
    width: 100%;
    max-width: 1200px;
    padding: clamp(10px, 3vw, 40px);
  }

  #headline {
    display: flex;
    flex-wrap: wrap; /* allows wrapping on small screens */
    justify-content: center;
    align-items: center;
    gap: clamp(8px, 2vw, 20px);
    
    font-size: clamp(20px, 4vw, 48px);
  }

  /* Headline text ONLY */
  .headline-text {
    color: #f9af0e;
    -webkit-text-stroke: 2px #5a3a2e;
  }

  /* Timer styling */
  #timer {
    display: inline-block;
    color: #ffffff;
    -webkit-text-stroke: 2px #C65A1E;
    font-family: "Spicy Rice", monospace;

    font-size: clamp(24px, 5vw, 48px); /* responsive scaling */
    text-align: center;
  }

  /* Each number block */
  #timer span {
    display: inline-block;
    width: 2ch;
    text-align: center;
  }

  /* Optional: better mobile stacking */
  @media (max-width: 600px) {
    #headline {
      flex-direction: column;
    }
  }
</style>

</head>
<body>

<div class="wrapper">
  <div id="headline">
    <span class="headline-text">2026 IPS Trade Show Begins In:</span>
    <span id="timer"></span>
  </div>
</div>

<script>
  const timerEl = document.getElementById("timer");

  const eventStart = new Date("June 9, 2026 09:00:00").getTime();
  const eventEnd = new Date("June 10, 2026 00:00:00").getTime();

  function updateCountdown() {
    const now = new Date().getTime();

    if (now >= eventEnd) {
      timerEl.textContent = "Thanks for coming!";
      return;
    }

    if (now >= eventStart) {
      timerEl.textContent = "Happening Now!";
      return;
    }

    const distance = eventStart - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((distance / (1000 * 60)) % 60);
    const seconds = Math.floor((distance / 1000) % 60);

    timerEl.innerHTML = `
      <span>${days}</span>d 
      <span>${hours}</span>h 
      <span>${minutes}</span>m 
      <span>${seconds}</span>s
    `;
  }

  setInterval(updateCountdown, 1000);
  updateCountdown();
</script>

</body>
</html>
