<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Countdown</title>

<style>
  body {
    margin: 0;
    font-family: "Spicy Rice", cursive;
    text-align: center;
    background: #fff;
    padding-top: 0px;
    display: flex;
    justify-content: center;
  }

  .wrapper {
    width: 100%;
    max-width: 1920px;
    text-align: center;
    padding: 40px 20px;
  }

  #headline {
    font-size: 48px;
    white-space: nowrap;
  }

  /* Headline text ONLY */
  .headline-text {
    color: #f9af0e;
    -webkit-text-stroke: 2px #5a3a2e;
  }

  /* Timer styling */
  #timer {
    display: inline-block;             /* allow fixed width */
    color: #ffffff;
    -webkit-text-stroke: 2px #C65A1E;
    font-family: "Spicy Rice", monospace; /* monospaced digits */
    min-width: 400px;                  /* adjust to fit longest expected text */
    text-align: center;                 /* center numbers inside block */
  }

  /* Optional: style each number span to ensure equal width */
  #timer span {
    display: inline-block;
    width: 2ch;    /* width of one digit */
    text-align: center;
  }
</style>

</head>
<body>

<a href="https://lp.constantcontactpages.com/ev/reg/ptt3cvz/lp/0207194b-5236-470f-96aa-59d8f186a6a9" target="_blank">  
<div class="wrapper">
  <div id="headline">
    <span class="headline-text">2026 IPS Trade Show Begins In:</span>
    <span id="timer"></span>
  </div>
</div>
</a>
<script>
  const timerEl = document.getElementById("timer");

  const eventStart = new Date("June 9, 2026 09:00:00").getTime();
  const eventEnd = new Date("June 10, 2026 00:00:00").getTime();

  function updateCountdown() {
    const now = new Date().getTime();

    if (now >= eventEnd) {
      timerEl.textContent = "Thanks for coming!";
      return;
    }

    if (now >= eventStart) {
      timerEl.textContent = "Happening Now!";
      return;
    }

    const distance = eventStart - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((distance / (1000 * 60)) % 60);
    const seconds = Math.floor((distance / 1000) % 60);

    // Use spans for each number to prevent shifting
    timerEl.innerHTML = `
      <span>${days}</span>d 
      <span>${hours}</span>h 
      <span>${minutes}</span>m 
      <span>${seconds}</span>s
    `;
  }

  setInterval(updateCountdown, 1000);
  updateCountdown();
</script>

</body>
</html>
